# This file must be encrypted with sops before deployment.
#
# Setup steps:
#   1. Get the NAS age public key (after first boot):
#      nix-shell -p ssh-to-age --run 'ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub'
#   2. Update .sops.yaml with that key
#   3. Encrypt and edit this file:
#      sops secrets/secrets.yaml
#   4. Add the following keys with their values:
#
# telegram_token: "bot<token>"
# telegram_chat_id: "<chat_id>"
# smb_user_password: "<password>"
# ftp_user_password: "<password>"
