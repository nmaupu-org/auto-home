image:
  repository: nmaupu/scan-http
  tag: "1.8"

persistence:
  scan-share:
    enabled: true
    type: nfs
    mountPath: /scans
    server: 192.168.12.8
    path: /tank/ftp_home/printer

service:
  main:
    enabled: true
    type: ClusterIP
    ports:
      main:
        enabled: true
        targetSelector: scan-http
        port: 5000
        protocol: tcp
        targetPort: 5000

ingress:
  main:
    enabled: true
    hosts:
      - host: scans.knas.home.fossar.net
        paths:
          - path: /
            pathType: Prefix
    integrations:
      certManager:
        certificateIssuer: google-dns-issuer-prod
        enabled: true
      traefik:
        allowCors: false
        enabled: true
        entrypoints:
          - websecure

global:
  traefik:
    fixedMiddlewares:
      - name: chain-basic
        namespace: ingress-controller

workload:
  main:
    podSpec:
      tolerations:
      - key: role
        operator: Equal
        value: nas
        effect: NoSchedule
      - key: role
        operator: Equal
        value: iot
        effect: NoSchedule
