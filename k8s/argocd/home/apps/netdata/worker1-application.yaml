---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netdata-worker1
  namespace: argocd
spec:
  project: default
  destination:
    namespace: netdata
    server: https://kubernetes.default.svc
  sources:
    - path: k8s/charts/host-ingress
      repoURL: https://github.com/nmaupu-org/auto-home.git
      targetRevision: master
      helm:
        releaseName: netdata-worker1
        valueFiles:
          - $values/k8s/argocd/home/apps/netdata/worker1-values.yaml
    - repoURL: https://github.com/nmaupu-org/auto-home.git
      targetRevision: master
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
