apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rtorrent-rutorrent
  namespace: argocd
spec:
  project: default
  destination:
    namespace: dls
    server: https://kubernetes.default.svc
  sources:
    - chart: rtorrent-rutorrent
      repoURL: oci.trueforge.org/truecharts
      targetRevision: 8.0.1
      helm:
        releaseName: rtorrent-rutorrent
        valueFiles:
          - $values/k8s/argocd/home/media/dls/rtorrent-rutorrent/values.yaml
    - repoURL: https://github.com/nmaupu-org/auto-home.git
      targetRevision: master
      ref: values
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.hostUsers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
