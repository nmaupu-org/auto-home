---
injector:
  enabled: false

server:
  # File storage — single node, no migration needed
  standalone:
    enabled: true
    config: |
      disable_mlock = true
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }

  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: openebs-zfs

  readinessProbe:
    enabled: true
    path: /v1/sys/health
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 5

  podLabels:
    vault-active: "true"

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: google-dns-issuer-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: vault.home.fossar.net
        paths:
          - /
      - host: vault.knas.home.fossar.net
        paths:
          - /
    tls:
      - secretName: vault-tls
        hosts:
          - vault.home.fossar.net
          - vault.knas.home.fossar.net
