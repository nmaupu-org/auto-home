---
deployment:
  replicas: 1

service:
  single: true
  spec:
    loadBalancerIP: 192.168.99.1
    externalTrafficPolicy: Local

ports:
  web:
    port: 80
    expose:
      default: true
  websecure:
    port: 443
    expose:
      default: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

metrics:
  prometheus: null
