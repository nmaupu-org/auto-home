---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iot-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  sources:
    - path: k8s/argocd/iot/deploy
      repoURL: https://github.com/nmaupu-org/auto-home.git
      targetRevision: master
      directory:
        recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
