---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iot-netdata
  namespace: argocd
spec:
  project: default
  destination:
    namespace: netdata
    name: iot
  sources:
    - path: k8s/charts/host-ingress
      repoURL: https://github.com/nmaupu-org/auto-home.git
      targetRevision: master
      helm:
        releaseName: netdata
        valueFiles:
          - $values/k8s/argocd/iot/deploy/netdata/values.yaml
    - repoURL: https://github.com/nmaupu-org/auto-home.git
      targetRevision: master
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
